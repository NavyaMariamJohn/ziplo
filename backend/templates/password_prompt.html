<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Link - Ziplo</title>
    <style>
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #0f172a; color: white; }
        .glass-box { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .icon { font-size: 3rem; margin-bottom: 20px; }
        h1 { margin: 0 0 10px; font-size: 1.5rem; font-weight: 600; }
        p { color: #94a3b8; font-size: 0.95rem; margin-bottom: 30px; line-height: 1.5; }
        input { width: 100%; box-sizing: border-box; padding: 14px; background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; color: white; font-size: 1rem; outline: none; transition: border-color 0.2s; margin-bottom: 20px; }
        input:focus { border-color: #ff4d6d; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #ff4d6d 0%, #ff758f 100%); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .error { color: #ff4d6d; background: rgba(255, 77, 109, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; border: 1px solid rgba(255, 77, 109, 0.2); }
    </style>
</head>
<body>
    <div class="glass-box">
        <div class="icon">🔒</div>
        <h1>Password Protected Link</h1>
        <p>The creator of this link has secured it with a password. Enter it below to continue.</p>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <input type="password" name="password" placeholder="Enter password..." required autofocus>
            <button type="submit">Unlock Link</button>
        </form>
    </div>
</body>
</html>
